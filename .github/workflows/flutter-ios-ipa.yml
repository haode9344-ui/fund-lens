name: Build Xiaoyou iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "flutter_app/**"
      - ".github/workflows/flutter-ios-ipa.yml"

jobs:
  build-ios-ipa:
    name: Build unsigned Xiaoyou IPA
    runs-on: macos-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate iOS runner
        run: |
          flutter create --platforms=ios --org com.haode9344 --project-name fund_lens .
          git checkout -- pubspec.yaml lib/main.dart

      - name: Configure iOS app metadata
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 小又" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Xiaoyou" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" ios/Runner/Info.plist
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.haode9344.fundlens;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Generate Xiaoyou app icon
        run: python3 tool/make_ios_icons.py

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze Dart code
        continue-on-error: true
        run: flutter analyze

      - name: Build iOS without codesign
        run: |
          set +e
          flutter build ios --release --no-codesign --config-only 2>&1 | tee build-ios-config.log
          config_status=${PIPESTATUS[0]}
          if [ "$config_status" -ne 0 ]; then
            summary=$(tail -n 80 build-ios-config.log | tr '\n' ' ' | cut -c1-3500 | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Flutter iOS config failed::$summary"
            exit "$config_status"
          fi
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/xcode \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee build-ios.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "---- Last build lines ----"
            tail -n 120 build-ios.log
            summary=$(tail -n 80 build-ios.log | tr '\n' ' ' | cut -c1-3500 | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            if [ -z "$summary" ]; then
              summary="flutter build ios failed; see the last build lines above."
            fi
            echo "::error title=Flutter iOS build failed::$summary"
            exit "$status"
          fi

      - name: Pack unsigned IPA
        run: |
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          APP_PATH=$(find build -type d -name Runner.app | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "::error title=Runner.app not found::xcodebuild finished but no Runner.app was found under build/."
            find build -maxdepth 6 -type d | sort
            exit 1
          fi
          echo "Packing $APP_PATH"
          cp -R "$APP_PATH" build/ipa/Payload/Xiaoyou.app
          cd build/ipa
          /usr/bin/zip -qry xiaoyou-unsigned.ipa Payload
          ls -lh xiaoyou-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaoyou-ios-unsigned-ipa
          path: flutter_app/build/ipa/xiaoyou-unsigned.ipa
          if-no-files-found: error
